<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Michael G. Navarro | Graphic Designer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 120px;
    }

    :root {
      --bg: #030816;
      --blue: #00d9ff;
      --blue2: #0077ff;
      --white: #eefaff;
      --muted: #9bb6c7;
      --border: rgba(0, 217, 255, 0.28);
      --shadow: 0 0 35px rgba(0, 217, 255, 0.25);
      --card-bg: rgba(255, 255, 255, 0.07);
      --nav-bg: rgba(4, 12, 28, 0.72);
      --text-soft: #c7d9e5;
    }

    body.light-theme {
      --bg: #f3fbff;
      --blue: #0077cc;
      --blue2: #00a6d6;
      --white: #071827;
      --muted: #425466;
      --border: rgba(0, 119, 204, 0.25);
      --shadow: 0 0 28px rgba(0, 119, 204, 0.15);
      --card-bg: rgba(255, 255, 255, 0.78);
      --nav-bg: rgba(255, 255, 255, 0.82);
      --text-soft: #24384a;
    }

    body.colorblind-theme {
      --bg: #111111;
      --blue: #ffb000;
      --blue2: #648fff;
      --white: #f7f7f7;
      --muted: #d0d0d0;
      --border: rgba(255, 176, 0, 0.45);
      --shadow: 0 0 35px rgba(255, 176, 0, 0.25);
      --card-bg: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(20, 20, 20, 0.82);
      --text-soft: #eeeeee;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(0, 217, 255, 0.22), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 119, 255, 0.2), transparent 35%),
        var(--bg);
      transition: background 0.35s ease, color 0.35s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent, rgba(0, 217, 255, 0.05), transparent),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 80px
        );
    }

    .water-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(0, 217, 255, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 119, 255, 0.25), transparent 35%);
    }

    .smoke {
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 45% 55% 60% 40%;
      background:
        radial-gradient(circle at 30% 30%, rgba(0, 217, 255, 0.65), transparent 35%),
        radial-gradient(circle at 70% 70%, rgba(0, 119, 255, 0.55), transparent 40%),
        radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 65%);
      filter: blur(10px);
      opacity: 0.58;
      animation: smokeWave 18s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .smoke1 {
      top: -120px;
      left: -120px;
    }

    .smoke2 {
      bottom: -150px;
      right: -130px;
      width: 500px;
      height: 500px;
      animation-duration: 22s;
      animation-delay: -4s;
    }

    .smoke3 {
      top: 30%;
      left: 35%;
      width: 360px;
      height: 360px;
      animation-duration: 26s;
      animation-delay: -7s;
    }

    .smoke4 {
      top: 10%;
      right: 10%;
      width: 300px;
      height: 300px;
      animation-duration: 20s;
      animation-delay: -2s;
      opacity: 0.65;
    }

    @keyframes smokeWave {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }

      25% {
        transform: translate3d(45px, -35px, 0) rotate(70deg) scale(1.08);
      }

      50% {
        transform: translate3d(-40px, 45px, 0) rotate(150deg) scale(0.96);
      }

      75% {
        transform: translate3d(38px, 42px, 0) rotate(230deg) scale(1.1);
      }

      100% {
        transform: translate3d(0, 0, 0) rotate(360deg) scale(1);
      }
    }

    .container {
      width: min(1120px, 92%);
      margin: auto;
    }

    nav {
      position: sticky;
      top: 18px;
      z-index: 100;
      margin: 18px auto;
      width: min(1120px, 92%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border: 1px solid var(--border);
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .logo {
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--blue);
      text-shadow: 0 0 16px rgba(0, 217, 255, 0.8);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--blue);
      text-shadow: 0 0 15px var(--blue);
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--blue);
      border: 1px solid var(--border);
      background: rgba(0, 217, 255, 0.08);
      font-size: 12px;
    }

    section {
      padding: 90px 0;
    }

    .hero {
      min-height: 88vh;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 36px;
      align-items: center;
    }

    .dnsc-alien-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-bottom: 22px;
    }

    .dnsc-alien-btn {
      position: relative;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(0, 217, 255, 0.45);
      background:
        linear-gradient(135deg, rgba(0, 217, 255, 0.16), rgba(80, 255, 220, 0.06)),
        rgba(3, 8, 22, 0.72);
      color: var(--blue);
      cursor: pointer;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      box-shadow:
        inset 0 0 18px rgba(0, 217, 255, 0.12),
        0 0 22px rgba(0, 217, 255, 0.18);
      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease,
        border-color 0.28s ease;
    }

    .dnsc-alien-btn::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -2;
      border-radius: inherit;
      background:
        conic-gradient(
          from 180deg,
          transparent,
          rgba(0, 217, 255, 0.8),
          rgba(117, 255, 220, 0.55),
          transparent,
          rgba(90, 87, 255, 0.45),
          transparent
        );
      opacity: 0;
      animation: alienOrbit 2.8s linear infinite;
      transition: opacity 0.25s ease;
    }

    .dnsc-alien-btn::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: inherit;
      background:
        radial-gradient(circle at 25% 35%, rgba(255, 255, 255, 0.16), transparent 20%),
        rgba(3, 8, 22, 0.88);
    }

    .dnsc-alien-btn:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: rgba(0, 217, 255, 0.78);
      box-shadow:
        inset 0 0 24px rgba(0, 217, 255, 0.16),
        0 0 30px rgba(0, 217, 255, 0.32),
        0 0 40px rgba(120, 255, 220, 0.12);
    }

    .dnsc-alien-btn:hover::before {
      opacity: 1;
    }

    .dnsc-alien-btn.holding {
      transform: translateY(-4px) scale(0.985);
      box-shadow:
        inset 0 0 26px rgba(0, 217, 255, 0.2),
        0 0 38px rgba(0, 217, 255, 0.42),
        0 0 55px rgba(117, 255, 220, 0.2);
    }

    .dnsc-alien-icon {
      position: relative;
      width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #b8fff6, #00d9ff 48%, #0047ff 100%);
      box-shadow:
        0 0 16px rgba(0, 217, 255, 0.75),
        inset -2px -3px 8px rgba(0, 0, 0, 0.25);
    }

    .dnsc-alien-icon::before,
    .dnsc-alien-icon::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 7px;
      top: 6px;
      border-radius: 50%;
      background: #02101c;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
    }

    .dnsc-alien-icon::before {
      left: 5px;
      transform: rotate(18deg);
    }

    .dnsc-alien-icon::after {
      right: 5px;
      transform: rotate(-18deg);
    }

    .dnsc-alien-text {
      display: grid;
      text-align: left;
      line-height: 1.1;
    }

    .dnsc-alien-text strong {
      font-size: 13px;
      letter-spacing: 1.6px;
    }

    .dnsc-alien-text span {
      margin-top: 3px;
      color: var(--text-soft);
      font-size: 10px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .hold-progress {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00d9ff, #7dffdf, #ffffff);
      box-shadow: 0 0 14px rgba(0, 217, 255, 0.85);
      transition: width 0.1s linear;
    }

    .dnsc-alien-btn.holding .hold-progress {
      width: 100%;
      transition: width 2.3s linear;
    }

    @keyframes alienOrbit {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .dnsc-options-overlay {
      position: fixed;
      inset: 0;
      z-index: 21000;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .dnsc-options-overlay.show {
      display: grid;
      animation: overlayFade 0.28s ease forwards;
    }

    .dnsc-options-box {
      position: relative;
      width: min(420px, 92vw);
      padding: 22px;
      border-radius: 30px;
      border: 1px solid rgba(0, 217, 255, 0.35);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06)),
        rgba(5, 18, 35, 0.72);
      backdrop-filter: blur(9px) saturate(1.35);
      -webkit-backdrop-filter: blur(9px) saturate(1.35);
      box-shadow:
        0 28px 60px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 0 42px rgba(0, 217, 255, 0.32);
      animation: glassPop 0.42s cubic-bezier(0.16, 0.84, 0.26, 1) forwards;
      overflow: hidden;
    }

    .dnsc-options-box::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.25), transparent 18%),
        radial-gradient(circle at 80% 75%, rgba(0, 217, 255, 0.24), transparent 24%),
        linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      opacity: 0.75;
      pointer-events: none;
      animation: glassLightMove 5s ease-in-out infinite alternate;
    }

    .dnsc-options-content {
      position: relative;
      z-index: 2;
    }

    .dnsc-options-header {
      margin-bottom: 18px;
    }

    .dnsc-options-header span {
      color: var(--blue);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .dnsc-options-header h3 {
      margin-top: 7px;
      font-size: 25px;
      color: var(--white);
    }

    .dnsc-options-header p {
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .dnsc-option-links {
      display: grid;
      gap: 12px;
    }

    .dnsc-option-link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px;
      border-radius: 20px;
      border: 1px solid rgba(0, 217, 255, 0.24);
      color: var(--white);
      text-decoration: none;
      background: rgba(0, 217, 255, 0.08);
      transition: 0.25s ease;
    }

    .dnsc-option-link:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 217, 255, 0.62);
      background: rgba(0, 217, 255, 0.14);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.28),
        0 0 24px rgba(0, 217, 255, 0.26);
    }

    .dnsc-option-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.26), transparent 24%),
        rgba(0, 217, 255, 0.13);
      border: 1px solid rgba(0, 217, 255, 0.28);
      font-size: 20px;
      flex-shrink: 0;
    }

    .dnsc-option-text strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .dnsc-option-text small {
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.4;
    }

    .dnsc-close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(0, 217, 255, 0.3);
      background: rgba(3, 8, 22, 0.72);
      color: var(--white);
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      transition: 0.25s ease;
    }

    .dnsc-close-btn:hover {
      color: var(--blue);
      transform: rotate(90deg) scale(1.08);
      box-shadow: 0 0 22px rgba(0, 217, 255, 0.4);
    }

    @keyframes overlayFade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes glassPop {
      from {
        opacity: 0;
        transform: translateY(34px) scale(0.92);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glassLightMove {
      from {
        transform: translate(-4%, -3%) rotate(0deg);
      }

      to {
        transform: translate(5%, 4%) rotate(8deg);
      }
    }

    h1 {
      font-size: clamp(42px, 7vw, 86px);
      line-height: 0.95;
      margin-bottom: 20px;
    }

    .gradient-text {
      color: var(--blue);
      text-shadow: 0 0 24px rgba(0, 217, 255, 0.75);
    }

    .hero-text h2 {
      color: var(--text-soft);
      font-size: clamp(20px, 3vw, 30px);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .hero-text p {
      color: var(--text-soft);
      line-height: 1.8;
      margin-bottom: 26px;
      max-width: 680px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      color: var(--white);
      background: rgba(0, 217, 255, 0.07);
      text-decoration: none;
      font-weight: 700;
      transition: 0.28s ease;
    }

    .btn.primary {
      background: rgba(0, 217, 255, 0.16);
      color: var(--blue);
    }

    .btn:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 217, 255, 0.55);
      box-shadow: 0 0 26px rgba(0, 217, 255, 0.32);
    }

    .profile-card,
    .glass-box,
    .skill-card,
    .project-card {
      border: 1px solid var(--border);
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .profile-card {
      padding: 22px;
      border-radius: 34px;
      overflow: hidden;
      transition: 0.32s ease;
    }

    .profile-card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: rgba(0, 217, 255, 0.55);
      box-shadow:
        0 22px 40px rgba(0, 0, 0, 0.38),
        0 0 38px rgba(0, 217, 255, 0.35);
    }

    .profile-img {
      width: 100%;
      aspect-ratio: 1 / 1.1;
      object-fit: cover;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: block;
    }

    .id-card {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      cursor: pointer;
      margin-top: 16px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(0, 217, 255, 0.2);
      background:
        radial-gradient(circle at var(--tap-x, 50%) var(--tap-y, 50%), rgba(0, 217, 255, 0.12), transparent 36%),
        rgba(0, 0, 0, 0.18);
      transition: 0.28s ease;
    }

    .id-card:hover {
      border-color: rgba(0, 217, 255, 0.45);
      box-shadow:
        inset 0 0 22px rgba(0, 217, 255, 0.08),
        0 0 22px rgba(0, 217, 255, 0.18);
    }

    .id-card.water-tap {
      animation: idCardWaterTap 0.45s ease;
    }

    .id-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      z-index: -1;
      background:
        radial-gradient(circle at var(--tap-x, 50%) var(--tap-y, 50%), rgba(255, 255, 255, 0.28), transparent 9%),
        radial-gradient(circle at var(--tap-x, 50%) var(--tap-y, 50%), rgba(0, 217, 255, 0.18), transparent 18%),
        linear-gradient(120deg, transparent, rgba(0, 217, 255, 0.08), transparent);
      opacity: 0;
      transform: scale(0.86);
      pointer-events: none;
    }

    .id-card.water-tap::before {
      animation: waterSurfaceFlash 0.95s ease-out;
    }

    .id-card small,
    .id-card h3,
    .id-card p {
      position: relative;
      z-index: 3;
    }

    .id-card small {
      color: var(--blue);
    }

    .id-card h3 {
      margin: 6px 0;
    }

    .id-water-drop {
      position: absolute;
      left: var(--drop-x);
      top: var(--drop-y);
      z-index: 2;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.98), rgba(0, 217, 255, 0.78) 38%, rgba(0, 119, 255, 0.18) 72%, transparent 74%);
      box-shadow:
        0 0 18px rgba(0, 217, 255, 0.75),
        inset -3px -4px 8px rgba(0, 0, 0, 0.18);
      animation: waterDropPop 0.7s ease-out forwards;
    }

    .id-water-ripple {
      position: absolute;
      left: var(--drop-x);
      top: var(--drop-y);
      z-index: 1;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      border: 2px solid rgba(150, 240, 255, 0.78);
      box-shadow:
        0 0 18px rgba(0, 217, 255, 0.48),
        inset 0 0 16px rgba(255, 255, 255, 0.18);
      filter: drop-shadow(0 0 8px rgba(0, 217, 255, 0.42));
      animation: waterRippleCircle 1.35s cubic-bezier(0.16, 0.84, 0.26, 1) forwards;
    }

    .id-water-ripple.ripple-2 {
      width: 38px;
      height: 38px;
      border-color: rgba(0, 217, 255, 0.55);
      animation-delay: 0.11s;
      animation-duration: 1.55s;
    }

    .id-water-ripple.ripple-3 {
      width: 48px;
      height: 48px;
      border-color: rgba(255, 255, 255, 0.38);
      animation-delay: 0.22s;
      animation-duration: 1.75s;
    }

    .id-water-ripple.ripple-4 {
      width: 58px;
      height: 58px;
      border-color: rgba(0, 119, 255, 0.34);
      animation-delay: 0.34s;
      animation-duration: 1.95s;
    }

    @keyframes waterDropPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0) translateY(-12px);
      }

      35% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.05) translateY(0);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.45) translateY(2px);
      }
    }

    @keyframes waterRippleCircle {
      0% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.1);
        filter: blur(0px) drop-shadow(0 0 10px rgba(0, 217, 255, 0.65));
      }

      45% {
        opacity: 0.72;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(9.5);
        filter: blur(1.8px) drop-shadow(0 0 3px rgba(0, 217, 255, 0));
      }
    }

    @keyframes waterSurfaceFlash {
      0% {
        opacity: 0;
        transform: scale(0.82) rotate(0deg);
      }

      35% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: scale(1.18) rotate(10deg);
      }
    }

    @keyframes idCardWaterTap {
      0% {
        transform: scale(1);
      }

      38% {
        transform: scale(0.985);
      }

      100% {
        transform: scale(1);
      }
    }

    .certificate-icon-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px 15px;
      border-radius: 22px;
      border: 1px solid rgba(0, 217, 255, 0.24);
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.14), transparent 28%),
        rgba(0, 217, 255, 0.08);
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 13px;
      cursor: pointer;
      text-align: left;
      transition: 0.28s ease;
      box-shadow: inset 0 0 18px rgba(0, 217, 255, 0.06);
    }

    .certificate-icon-btn:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(0, 217, 255, 0.55);
      background: rgba(0, 217, 255, 0.14);
      box-shadow:
        0 16px 28px rgba(0, 0, 0, 0.32),
        0 0 30px rgba(0, 217, 255, 0.32);
    }

    .certificate-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border-radius: 16px;
      font-size: 23px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.28), transparent 25%),
        rgba(0, 217, 255, 0.13);
      border: 1px solid rgba(0, 217, 255, 0.3);
      box-shadow: 0 0 18px rgba(0, 217, 255, 0.18);
    }

    .certificate-text strong {
      display: block;
      color: var(--blue);
      font-size: 14px;
      letter-spacing: 0.8px;
    }

    .certificate-text small {
      display: block;
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .certificate-popup {
      position: fixed;
      inset: 0;
      z-index: 22000;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .certificate-popup.show {
      display: grid;
      animation: overlayFade 0.28s ease forwards;
    }

    .certificate-popup-box {
      position: relative;
      isolation: isolate;
      width: min(930px, 94vw);
      max-height: 92vh;
      padding: 22px;
      border-radius: 34px;
      border: 1px solid rgba(0, 217, 255, 0.42);
      background:
        linear-gradient(135deg, rgba(0, 217, 255, 0.14), rgba(80, 255, 220, 0.05)),
        rgba(3, 8, 22, 0.68);
      backdrop-filter: blur(16px) saturate(1.35);
      -webkit-backdrop-filter: blur(16px) saturate(1.35);
      box-shadow:
        inset 0 0 24px rgba(0, 217, 255, 0.12),
        0 28px 60px rgba(0, 0, 0, 0.55),
        0 0 46px rgba(0, 217, 255, 0.34);
      animation: certificatePopupRise 0.42s ease forwards;
      overflow: hidden;
    }

    .certificate-popup-box::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -2;
      border-radius: inherit;
      background:
        conic-gradient(
          from 180deg,
          transparent,
          rgba(0, 217, 255, 0.8),
          rgba(117, 255, 220, 0.55),
          transparent,
          rgba(90, 87, 255, 0.45),
          transparent
        );
      opacity: 0.75;
      animation: alienOrbit 3.8s linear infinite;
    }

    .certificate-popup-box::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: inherit;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.14), transparent 18%),
        radial-gradient(circle at 85% 80%, rgba(0, 217, 255, 0.16), transparent 22%),
        rgba(3, 8, 22, 0.86);
    }

    .certificate-popup-header {
      padding: 6px 8px 16px;
    }

    .certificate-popup-header span {
      color: var(--blue);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .certificate-popup-header h3 {
      margin-top: 7px;
      font-size: 25px;
      color: var(--white);
    }

    .certificate-popup-header p {
      margin-top: 7px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .certificate-frame-wrap {
      position: relative;
      isolation: isolate;
      width: 100%;
      height: min(64vh, 630px);
      padding: 10px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(0, 217, 255, 0.32);
      background:
        linear-gradient(135deg, rgba(0, 217, 255, 0.13), rgba(117, 255, 220, 0.04)),
        rgba(3, 8, 22, 0.52);
      box-shadow:
        inset 0 0 22px rgba(0, 217, 255, 0.1),
        0 0 26px rgba(0, 217, 255, 0.18);
    }

    .certificate-frame-wrap::before {
      content: "";
      position: absolute;
      inset: -45%;
      z-index: -1;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.2), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(0, 217, 255, 0.22), transparent 24%),
        linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      animation: glassLightMove 5s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .certificate-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      border-radius: 20px;
      object-fit: contain;
      background: transparent;
    }

    .certificate-close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.16), transparent 20%),
        rgba(4, 12, 28, 0.88);
      color: var(--white);
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      box-shadow:
        0 0 22px rgba(0, 217, 255, 0.42),
        0 10px 22px rgba(0, 0, 0, 0.45);
      transition: 0.25s ease;
    }

    .certificate-close-btn:hover {
      color: var(--blue);
      transform: rotate(90deg) scale(1.08);
      box-shadow: 0 0 28px rgba(0, 217, 255, 0.6);
    }

    @keyframes certificatePopupRise {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.92);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .settings-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .settings-btn {
      width: 43px;
      height: 43px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.16), transparent 28%),
        rgba(0, 217, 255, 0.08);
      color: var(--white);
      cursor: pointer;
      font-size: 20px;
      display: grid;
      place-items: center;
      transition: 0.25s ease;
      box-shadow: inset 0 0 15px rgba(0, 217, 255, 0.06);
    }

    .settings-btn:hover {
      transform: translateY(-4px) rotate(35deg) scale(1.08);
      border-color: rgba(0, 217, 255, 0.62);
      box-shadow:
        0 0 22px rgba(0, 217, 255, 0.36),
        0 0 24px rgba(255, 0, 212, 0.12);
    }

    .settings-panel {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      z-index: 1000;
      width: min(330px, 86vw);
      display: none;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(0, 217, 255, 0.35);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06)),
        rgba(5, 18, 35, 0.86);
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
      box-shadow:
        0 24px 46px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 0 32px rgba(0, 217, 255, 0.26);
      animation: settingsPop 0.25s ease forwards;
      overflow: hidden;
    }

    .settings-panel.show {
      display: block;
    }

    .settings-panel::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.16), transparent 18%),
        radial-gradient(circle at 90% 80%, rgba(0, 217, 255, 0.18), transparent 24%),
        linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      pointer-events: none;
      animation: glassLightMove 5s ease-in-out infinite alternate;
    }

    .settings-content {
      position: relative;
      z-index: 2;
    }

    .settings-content h4 {
      color: var(--blue);
      font-size: 13px;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .settings-section {
      margin-top: 13px;
      padding-top: 13px;
      border-top: 1px solid rgba(0, 217, 255, 0.18);
    }

    .settings-label {
      display: block;
      color: var(--text-soft);
      font-size: 12px;
      margin-bottom: 9px;
      letter-spacing: 0.8px;
    }

    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .theme-btn,
    .lang-btn {
      min-width: 48px;
      min-height: 39px;
      padding: 9px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0, 217, 255, 0.08);
      color: var(--white);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: 0.25s ease;
    }

    .theme-btn:hover,
    .lang-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 217, 255, 0.62);
      box-shadow:
        0 0 18px rgba(0, 217, 255, 0.35),
        0 0 20px rgba(255, 0, 212, 0.12);
    }

    .theme-btn.active-theme,
    .lang-btn.active-lang {
      color: var(--blue);
      border-color: rgba(0, 217, 255, 0.72);
      background: rgba(0, 217, 255, 0.16);
      box-shadow: 0 0 18px rgba(0, 217, 255, 0.35);
    }

    @keyframes settingsPop {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
