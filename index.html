<script>
  const cursor = document.querySelector(".cursor-water");
  const canUseCursor = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

  if (cursor && canUseCursor) {
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let currentX = targetX;
    let currentY = targetY;

    document.addEventListener("mousemove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    }, { passive: true });

    function smoothCursor() {
      currentX += (targetX - currentX) * 0.22;
      currentY += (targetY - currentY) * 0.22;

      cursor.style.left = currentX + "px";
      cursor.style.top = currentY + "px";
      cursor.style.transform = "translate3d(-50%, -50%, 0) scale(1)";

      requestAnimationFrame(smoothCursor);
    }

    smoothCursor();

    document.addEventListener("mousedown", () => {
      cursor.classList.add("active");
    });

    document.addEventListener("mouseup", () => {
      cursor.classList.remove("active");
    });

    document.addEventListener("mouseleave", () => {
      cursor.classList.remove("active");
    });
  } else if (cursor) {
    cursor.style.display = "none";
  }

  const cards = document.querySelectorAll(".profile-card, .skill-card, .project-card");

  cards.forEach((card) => {
    card.addEventListener("mousemove", (e) => {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      card.style.setProperty("--x", x + "%");
      card.style.setProperty("--y", y + "%");
    }, { passive: true });
  });

  const popup = document.getElementById("desktopPopup");
  const continuePopup = document.getElementById("continuePopup");
  const backPopup = document.getElementById("backPopup");

  function isMobileDevice() {
    const smallScreen = window.innerWidth <= 900;
    const touchDevice = navigator.maxTouchPoints > 0;
    const coarsePointer = window.matchMedia("(pointer: coarse)").matches;
    return smallScreen || touchDevice || coarsePointer;
  }

  function showMobilePopup() {
    if (popup && isMobileDevice()) {
      popup.classList.add("show");
    }
  }

  window.addEventListener("load", () => {
    setTimeout(showMobilePopup, 400);
  });

  continuePopup.addEventListener("click", () => {
    popup.classList.remove("show");
  });

  backPopup.addEventListener("click", () => {
    const previousPage = document.referrer;

    if (previousPage && previousPage !== window.location.href) {
      window.location.href = previousPage;
    } else if (window.history.length > 1) {
      window.history.go(-1);
    } else {
      window.location.href = "https://www.google.com";
    }
  });

  popup.addEventListener("click", (e) => {
    if (e.target === popup) {
      popup.classList.add("show");
    }
  });

  const themeButtons = document.querySelectorAll(".theme-btn");

  function applyTheme(theme) {
    document.body.classList.remove("light-theme", "colorblind-theme");

    if (theme === "light") {
      document.body.classList.add("light-theme");
    }

    if (theme === "colorblind") {
      document.body.classList.add("colorblind-theme");
    }

    themeButtons.forEach((btn) => {
      btn.classList.toggle("active-theme", btn.dataset.theme === theme);
    });

    localStorage.setItem("portfolioTheme", theme);
  }

  const savedTheme = localStorage.getItem("portfolioTheme") || "default";
  applyTheme(savedTheme);

  themeButtons.forEach((button) => {
    button.addEventListener("click", () => {
      applyTheme(button.dataset.theme);
    });
  });
</script>
