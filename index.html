<!-- CERTIFICATE ADD-ON: Paste this before </body> only -->
<style>
  .certificate-icon-btn {
    width: 100%;
    margin-top: 14px;
    padding: 14px 15px;
    border-radius: 22px;
    border: 1px solid rgba(0, 217, 255, 0.24);
    background:
      radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.14), transparent 28%),
      rgba(0, 217, 255, 0.08);
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 13px;
    cursor: pointer;
    text-align: left;
    transition: 0.28s ease;
    box-shadow: inset 0 0 18px rgba(0, 217, 255, 0.06);
  }

  .certificate-icon-btn:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: rgba(0, 217, 255, 0.55);
    background: rgba(0, 217, 255, 0.14);
    box-shadow:
      0 16px 28px rgba(0, 0, 0, 0.32),
      0 0 30px rgba(0, 217, 255, 0.32);
  }

  .certificate-icon {
    width: 46px;
    height: 46px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border-radius: 16px;
    font-size: 23px;
    background:
      radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.28), transparent 25%),
      rgba(0, 217, 255, 0.13);
    border: 1px solid rgba(0, 217, 255, 0.3);
    box-shadow: 0 0 18px rgba(0, 217, 255, 0.18);
  }

  .certificate-text strong {
    display: block;
    color: var(--blue);
    font-size: 14px;
    letter-spacing: 0.8px;
  }

  .certificate-text small {
    display: block;
    margin-top: 4px;
    color: var(--text-soft);
    font-size: 12px;
  }

  .certificate-popup {
    position: fixed;
    inset: 0;
    z-index: 22000;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.62);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .certificate-popup.show {
    display: grid;
    animation: overlayFade 0.28s ease forwards;
  }

  .certificate-popup-box {
    position: relative;
    isolation: isolate;
    width: min(930px, 94vw);
    max-height: 92vh;
    padding: 22px;
    border-radius: 34px;
    border: 1px solid rgba(0, 217, 255, 0.42);
    background:
      linear-gradient(135deg, rgba(0, 217, 255, 0.14), rgba(80, 255, 220, 0.05)),
      rgba(3, 8, 22, 0.68);
    backdrop-filter: blur(16px) saturate(1.35);
    -webkit-backdrop-filter: blur(16px) saturate(1.35);
    box-shadow:
      inset 0 0 24px rgba(0, 217, 255, 0.12),
      0 28px 60px rgba(0, 0, 0, 0.55),
      0 0 46px rgba(0, 217, 255, 0.34);
    animation: certificatePopupRise 0.42s ease forwards;
    overflow: hidden;
  }

  .certificate-popup-box::before {
    content: "";
    position: absolute;
    inset: -2px;
    z-index: -2;
    border-radius: inherit;
    background:
      conic-gradient(
        from 180deg,
        transparent,
        rgba(0, 217, 255, 0.8),
        rgba(117, 255, 220, 0.55),
        transparent,
        rgba(90, 87, 255, 0.45),
        transparent
      );
    opacity: 0.75;
    animation: alienOrbit 3.8s linear infinite;
  }

  .certificate-popup-box::after {
    content: "";
    position: absolute;
    inset: 1px;
    z-index: -1;
    border-radius: inherit;
    background:
      radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.14), transparent 18%),
      radial-gradient(circle at 85% 80%, rgba(0, 217, 255, 0.16), transparent 22%),
      rgba(3, 8, 22, 0.86);
  }

  .certificate-popup-header {
    padding: 6px 8px 16px;
  }

  .certificate-popup-header span {
    color: var(--blue);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .certificate-popup-header h3 {
    margin-top: 7px;
    font-size: 25px;
    color: var(--white);
  }

  .certificate-popup-header p {
    margin-top: 7px;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.5;
  }

  .certificate-frame-wrap {
    position: relative;
    isolation: isolate;
    width: 100%;
    height: min(64vh, 630px);
    padding: 10px;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid rgba(0, 217, 255, 0.32);
    background:
      linear-gradient(135deg, rgba(0, 217, 255, 0.13), rgba(117, 255, 220, 0.04)),
      rgba(3, 8, 22, 0.52);
    box-shadow:
      inset 0 0 22px rgba(0, 217, 255, 0.1),
      0 0 26px rgba(0, 217, 255, 0.18);
  }

  .certificate-frame-wrap::before {
    content: "";
    position: absolute;
    inset: -45%;
    z-index: -1;
    background:
      radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.2), transparent 18%),
      radial-gradient(circle at 75% 70%, rgba(0, 217, 255, 0.22), transparent 24%),
      linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.12), transparent);
    animation: glassLightMove 5s ease-in-out infinite alternate;
    pointer-events: none;
  }

  .certificate-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    border-radius: 20px;
    object-fit: contain;
    background: transparent;
  }

  .certificate-close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 3;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background:
      radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.16), transparent 20%),
      rgba(4, 12, 28, 0.88);
    color: var(--white);
    cursor: pointer;
    font-size: 28px;
    line-height: 1;
    box-shadow:
      0 0 22px rgba(0, 217, 255, 0.42),
      0 10px 22px rgba(0, 0, 0, 0.45);
    transition: 0.25s ease;
  }

  .certificate-close-btn:hover {
    color: var(--blue);
    transform: rotate(90deg) scale(1.08);
    box-shadow: 0 0 28px rgba(0, 217, 255, 0.6);
  }

  @keyframes certificatePopupRise {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.92);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @media (max-width: 560px) {
    .certificate-popup-box {
      padding: 16px;
    }

    .certificate-frame-wrap {
      height: 55vh;
      padding: 7px;
    }

    .certificate-popup-header h3 {
      font-size: 21px;
    }
  }
</style>

<div class="certificate-popup" id="certificatePopup">
  <div class="certificate-popup-box">
    <button class="certificate-close-btn" id="closeCertificatePopup" aria-label="Close certificate popup">×</button>

    <div class="certificate-popup-header">
      <span>[ CERTIFICATE ]</span>
      <h3>Cybersecurity Essentials</h3>
      <p>Cisco Networking Academy · Davao Del Norte State College</p>
    </div>

    <div class="certificate-frame-wrap">
      <img
        src="assets/profile.jpg.jpg"
        class="certificate-frame"
        alt="Michael Navarro Certificate"
      />
    </div>
  </div>
</div>

<script>
  const digitalIdCardForCertificate = document.getElementById("digitalIdCard");

  if (digitalIdCardForCertificate && !document.getElementById("openCertificatePopup")) {
    digitalIdCardForCertificate.insertAdjacentHTML(
      "afterend",
      `
      <button class="certificate-icon-btn" id="openCertificatePopup" type="button">
        <span class="certificate-icon">🏅</span>
        <span class="certificate-text">
          <strong>Certificate</strong>
          <small>Tap to view achievement</small>
        </span>
      </button>
      `
    );
  }

  const openCertificatePopup = document.getElementById("openCertificatePopup");
  const certificatePopup = document.getElementById("certificatePopup");
  const closeCertificatePopup = document.getElementById("closeCertificatePopup");

  function openCertificate() {
    if (!certificatePopup) return;

    certificatePopup.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function closeCertificate() {
    if (!certificatePopup) return;

    certificatePopup.classList.remove("show");
    document.body.style.overflow = "";
  }

  openCertificatePopup?.addEventListener("click", openCertificate);
  closeCertificatePopup?.addEventListener("click", closeCertificate);

  certificatePopup?.addEventListener("click", (e) => {
    if (e.target === certificatePopup) {
      closeCertificate();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && certificatePopup?.classList.contains("show")) {
      closeCertificate();
    }
  });
</script>
